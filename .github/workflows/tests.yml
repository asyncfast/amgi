name: Tests
on:
  push:
    branches: main
  pull_request:
    branches: main
permissions:
  contents: read
  id-token: write
env:
  FORCE_COLOR: 1
jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install the project
        run: uv sync --locked --all-extras --dev
      - name: Cache pre-commit
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|${{ hashFiles('.pre-commit-config.yaml') }}
      - name: Check commit messages (Commitizen)
        if: github.event_name == 'pull_request'
        run: |
          range="${{ github.event.pull_request.base.sha }}..HEAD"
          uv run cz check --rev-range "${range}"
      - name: Run pre-commit
        run: uv run pre-commit run --all-files
  tests:
    name: Run Tests (${{ matrix.os.name }}, ${{ matrix.label }})
    runs-on: ${{ matrix.os.name }}
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        os:
          - name: ubuntu-latest
            pytest_args: ""
          - name: macos-latest
            pytest_args: -m "not integration"
          - name: windows-latest
            pytest_args: -m "not integration"
        label:
          - amgi-aiobotocore
          - amgi-aiokafka
          - amgi-cloudevents
          - amgi-common
          - amgi-kafka-event-source-mapping
          - amgi-paho-mqtt
          - amgi-redis
          - amgi-sqs-event-source-mapping
          - amgi-types
          - asyncfast
          - asyncfast-cli
          - pytest-amgi
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
      - name: Install the project
        run: uv sync --locked --all-extras --dev
      - name: Run tests
        shell: bash
        run: uv run tox -m "${{ matrix.label }}" -- ${{ matrix.os.pytest_args }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os.name }}-${{ matrix.label }}
          path: coverage.xml
          if-no-files-found: ignore
  coverage:
    name: Upload Coverage
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download coverage artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-*
          path: coverage-reports
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          directory: coverage-reports
          fail_ci_if_error: true
          use_oidc: true
